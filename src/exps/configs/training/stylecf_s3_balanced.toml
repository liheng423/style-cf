[train_entry_config]
target_model = "stylecf"

[style_train_config]
best_model_path_template = "models/stylecf-s3-balanced-{timestamp}.pth"
training_mode = "three_stage"
seed = 42

w_spacing = 1.0
w_acc = 0.35
w_contrastive = 0.08
contrastive_temperature = 0.15
metrics_eval_batches = 20
max_norm = 8

stage1_epochs = 10
stage2_epochs = 10
stage3_epochs = 20
stage1_lr = 0.0005
stage2_lr = 0.0003
stage3_lr = 0.0001
stage2_objective = "contrastive"

