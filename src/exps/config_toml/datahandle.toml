filter_names = [
  "time_headway_check",
  "all_same_leader",
  "speed_in_range",
  "veh_exist",
  "space_in_range",
  "inconsistent",
]

[data_filter_config]
acceleration_range = [-6, 6]
speed_range = [0, 30]
allow_leader_lc = false
spacing_range = [10, 100]
length_thres = 6
dtw_range = [0, 30]
thw = [0, 2]
pos_tol_range = [0, 2.5]
r_time_range = [0, 2]
spd_tol_range = [0, 100]

[style_data_config]
batch_size = 64
train_data_ratio = 0.7
seq_len = 60
label_len = 40
pred_len = 40
stride = 20
scaler = "StandardScaler"
dataset = "StyledTransfollowerDataset"
model_name = "StyleTransformer"

[style_data_config.x_groups.enc_x]
features = ["SELF_V", "DELTA_X", "DELTA_V", "SELF_L", "LEAD_L"]
transform = true

[style_data_config.x_groups.dec_x]
features = ["SELF_V", "LEAD_V"]
transform = true

[style_data_config.x_groups.style]
features = ["REACT", "THW", "DELTA_X", "SELF_V"]
transform = true

[style_data_config.y_groups.y_seq]
features = ["SELF_X", "SELF_V", "SELF_A", "DELTA_X", "LEAD_X"]

[lstm_data_config]
batch_size = 64
train_data_ratio = 0.8
seq_len = 40
pred_len = 20
stride = 20
scaler = "StandardScaler"
dataset = "LSTMDataset"
in_features = ["SELF_V", "DELTA_X", "DELTA_V", "SELF_L", "LEAD_L"]
eva_features = ["SELF_X", "SELF_V", "SELF_A", "DELTA_X", "LEAD_X"]
