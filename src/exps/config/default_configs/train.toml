[style_train_config]
num_epoch = 40
max_norm = 10
dt = 0.1
device = "auto"
datapath = "data/data/Zentraffic90"
style_scaler_path = "data/saved_scalers/scaler_stylecf.pkl"
transformer_scaler_path = "data/saved_scalers/scaler_transfollower.pkl"
split_index_path = "data/saved_splits/stylecf_group_split.npz"
seed = 42
best_model_path_template = "models/best-model-{timestamp}.pth"
training_mode = "three_stage"
loss_func = "StyleMultiTaskLoss.default"
optim = "Adam"
lr = 0.0005
w_spacing = 1.0
w_acc = 0.3
w_contrastive = 0.1
contrastive_temperature = 0.2
metrics_eval_batches = 10

stage1_epochs = 12
stage2_epochs = 10
stage3_epochs = 18
stage1_lr = 0.0005
stage2_lr = 0.0003
stage3_lr = 0.0001
stage2_objective = "contrastive"

[style_train_config.logger]
mode = "normal"
